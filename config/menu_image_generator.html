<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>沙耶香菜单</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans SC','Hiragino Sans GB','Microsoft YaHei',Arial;background:#f3f4f6}
    .bg-layer{position:fixed;inset:0;background-position:center;background-size:cover;background-repeat:no-repeat;filter:brightness(.85);transition:filter .25s ease, transform .25s ease;}
    .bg-layer.dim{filter:brightness(.55)}
    .overlay{position:fixed;inset:0;background:linear-gradient(180deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15));pointer-events:none;}
    .app{position:relative;z-index:2;max-width:1200px;margin:18px auto;padding:12px;width:94%;min-height:calc(100vh - 56px);display:flex;flex-direction:column;gap:10px}
    .top{display:flex;align-items:center;gap:12px}
    .title-wrap{flex:1}
    .title{color:#ffffff;font-weight:800;line-height:1.05;letter-spacing:0.4px;font-size:clamp(20px,6vw,28px);text-shadow:0 2px 12px rgba(0,0,0,0.35)}
    .subtitle{font-size:12px;color:rgba(255,255,255,0.85);margin-top:4px;opacity:0.95}
    h2{color:rgba(255,255,255,0.85);font-size:14px;margin:12px 0 6px 0;font-weight:600}
    /* 卡片容器 */
    .cards{
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(var(--card-min-width, 120px), 1fr));
      gap: 10px;
      margin-top: 6px;
    }
    /* 卡片样式 */
    .card{
      background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border-radius:10px;
      padding:8px;
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,0.06);
      color:rgba(255,255,255,0.95);
      box-shadow:0 4px 10px rgba(2,6,23,0.22);
      display:flex;
      gap:8px;
      align-items:center;
      min-height: var(--card-min-height, 80px);
      transition: all 0.3s ease;
    }
    .card .content{flex:1}
    .card .name{font-size:13px;font-weight:700;margin-bottom:3px}
    .card .desc{font-size:11px;color:rgba(255,255,255,0.82)}
    .footer{margin-top:auto;padding:8px 12px;text-align:center;font-size:12px;color:rgba(255,255,255,0.85);opacity:0.95}
    /* 工具栏样式 */
    .toolbar-container {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 3;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: all 0.3s ease;
      opacity: 0;
    }
    .toolbar-container:hover {
      opacity: 1;
    }
    .toolbar {
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .toolbar.hidden {
      transform: translateY(120%);
      opacity: 0;
      pointer-events: none;
    }
    .toggle-toolbar {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.1);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      color: white;
      cursor: pointer;
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      z-index: 4;
      opacity: 0.1;
      transition: opacity 0.3s ease;
    }
    .toolbar-container:hover .toggle-toolbar {
      opacity: 1;
    }
    .btn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.08);padding:10px 12px;border-radius:10px;color:white;font-weight:600;backdrop-filter:blur(8px);cursor:pointer}
    .small{padding:8px 10px;font-size:13px}
    [contenteditable]{outline:none}
    .light-mode .card{background:linear-gradient(180deg, rgba(255,255,255,0.8), rgba(255,255,255,0.75));color:#0b1220;border:1px solid rgba(11,18,32,0.06);box-shadow:0 6px 18px rgba(11,18,32,0.06)}
    .light-mode .title{color:#0b1220;text-shadow:none}
    .light-mode .footer{color:rgba(11,18,32,0.7)}
    .light-mode .btn, .light-mode .toggle-toolbar{
      background:rgba(0,0,0,0.08);
      color:#0b1220;
      border-color:rgba(0,0,0,0.1);
    }
    
    /* 尺寸设置面板 */
    .size-control {
      position: fixed;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.5);
      padding: 12px;
      border-radius: 8px;
      color: white;
      z-index: 10;
      display: none;
    }
    .size-control.active {
      display: block;
    }
    .size-control label {
      display: block;
      margin: 8px 0;
      font-size: 13px;
    }
    .size-control input {
      width: 100%;
      padding: 4px;
      margin-top: 4px;
    }
    .light-mode .size-control {
      background: rgba(255,255,255,0.9);
      color: #0b1220;
    }
  </style>
</head>
<body>
  <!-- 尺寸控制面板 -->
  <div class="size-control" id="sizeControl">
    <h3>卡片尺寸设置</h3>
    <label>
      最小宽度 (px):
      <input type="number" id="cardMinWidth" value="120" min="80" max="300">
    </label>
    <label>
      最小高度 (px):
      <input type="number" id="cardMinHeight" value="80" min="50" max="200">
    </label>
    <label>
      卡片间距 (px):
      <input type="number" id="cardGap" value="10" min="2" max="30">
    </label>
    <button class="btn small" id="applySize">应用</button>
  </div>

  <div id="bg" class="bg-layer" style="background-image:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1600&auto=format&fit=crop');"></div>
  <div class="overlay"></div>
  <main class="app" id="app">
    <header class="top">
      <div class="title-wrap">
        <div id="title" class="title" contenteditable="true" spellcheck="false">沙耶香菜单</div>
        <div id="subtitle" class="subtitle" contenteditable="true" spellcheck="false">Bot功能菜单</div>
      </div>
    </header>
    <h2 contenteditable="true">主动触发</h2>
    <section class="cards" id="active-cards">
      <article class="card"><div class="content"><div class="name" contenteditable="true">bing</div><div class="desc" contenteditable="true">必应每日图片</div></div></article>
      <article class="card"><div class="content"><div class="name" contenteditable="true">kfc</div><div class="desc" contenteditable="true">肯德基疯狂星期四文案</div></div></article>
      <article class="card"><div class="content"><div class="name" contenteditable="true">天气</div><div class="desc" contenteditable="true">获取指定城市的实时天气</div></div></article>
      <article class="card"><div class="content"><div class="name" contenteditable="true">看妹妹</div><div class="desc" contenteditable="true">获取随机图片</div></div></article>
      <article class="card"><div class="content"><div class="name" contenteditable="true">搜</div><div class="desc" contenteditable="true">搜索网盘资源</div></div></article>
      <article class="card"><div class="content"><div class="name" contenteditable="true">meme表情包</div><div class="desc" contenteditable="true">关键词触发指定表情包</div></div></article>
      <article class="card"><div class="content"><div class="name" contenteditable="true">早报</div><div class="desc" contenteditable="true">每日60s早报</div></div></article>
      <article class="card"><div class="content"><div class="name" contenteditable="true">流量卡</div><div class="desc" contenteditable="true">搜索最新的运营商流量卡信息</div></div></article>
    </section>
    <h2 contenteditable="true">被动触发</h2>
    <section class="cards" id="passive-cards">
      <article class="card"><div class="content"><div class="name" contenteditable="true">链接解析</div><div class="desc" contenteditable="true">解析哔哩哔哩，gitee，github链接</div></div></article>
      <article class="card"><div class="content"><div class="name" contenteditable="true">每日早报</div><div class="desc" contenteditable="true">每日60s早报</div></div></article>
    </section>
    <h2 contenteditable="true">使用'<功能名> --help'查看使用帮助</h2>
    <section class="cards" id="help-cards">
    </section>
    <div class="footer" id="footer">版本 v1.0 · 作者：sheetung</div>
  </main>
  
  <!-- 可折叠工具栏 -->
  <div class="toolbar-container">
    <div class="toolbar" id="toolbar">
      <label class="btn small" for="bgfile">更换背景（本地）</label>
      <input id="bgfile" type="file" accept="image/*" style="display:none">
      <button id="setUrl" class="btn small">使用图片 URL</button>
      <button id="addCard" class="btn small">添加菜单卡片</button>
      <button id="toggleTheme" class="btn small">切换 浅/深 主题</button>
      <button id="toggleSizeControl" class="btn small">卡片尺寸设置</button>
    </div>
    <button class="toggle-toolbar" id="toggleToolbar">☰</button>
  </div>

  <script>
    // 元素获取
    const bg=document.getElementById('bg');
    const bgfile=document.getElementById('bgfile');
    const setUrl=document.getElementById('setUrl');
    const addCard=document.getElementById('addCard');
    const activeCards=document.getElementById('active-cards');
    const footer=document.getElementById('footer');
    const toggleSizeControl=document.getElementById('toggleSizeControl');
    const sizeControl=document.getElementById('sizeControl');
    const cardMinWidth=document.getElementById('cardMinWidth');
    const cardMinHeight=document.getElementById('cardMinHeight');
    const cardGap=document.getElementById('cardGap');
    const applySize=document.getElementById('applySize');
    const allCardsContainers=document.querySelectorAll('.cards');
    const toolbar=document.getElementById('toolbar');
    const toggleToolbar=document.getElementById('toggleToolbar');

    // 工具栏切换
    toggleToolbar.addEventListener('click', () => {
      toolbar.classList.toggle('hidden');
      toggleToolbar.textContent = toolbar.classList.contains('hidden') ? '☰' : '✕';
    });

    // 背景图片处理
    bgfile.addEventListener('change',e=>{
      const f=e.target.files&&e.target.files[0];
      if(!f)return;
      const url=URL.createObjectURL(f);
      bg.style.backgroundImage=`url('${url}')`;
      setTimeout(()=>URL.revokeObjectURL(url),60000);
    });

    setUrl.addEventListener('click',()=>{
      const url=prompt('请输入图片 URL（以 http/https 开头）:');
      if(url)bg.style.backgroundImage=`url('${url}')`;
    });

    // 添加卡片
    addCard.addEventList
